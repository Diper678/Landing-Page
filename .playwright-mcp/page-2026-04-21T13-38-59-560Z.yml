  - generic [ref=e123]:
    - generic [ref=e124]: Por qué Sisteco
    - heading "La empresa agéntica de ventas. Service-as-a-Software para Chile y LATAM." [level=2] [ref=e125]:
      - text: La empresa agéntica de ventas.
      - text: Service-as-a-Software para Chile y LATAM.
    - generic [ref=e126]:
      - paragraph [ref=e127]: Clay levantó $3.1B vendiendo herramientas de prospección en US. Nosotros no vendemos herramientas — hacemos el trabajo. Operamos tu prospección completa como servicio gestionado, con la misma tecnología de punta pero adaptada al mercado chileno.
      - paragraph [ref=e128]: "Un CRM gringo no sabe qué es un RUT, no consulta el SII, no entiende la Ley 21.719 y no tiene idea de cómo se cierran negocios en Santiago. Esa brecha es nuestro foso — y se profundiza con cada cliente que se suma a la red. Datos geográficamente localizados en Chile: ese es el activo que no se importa."
      - paragraph [ref=e129]:
        - text: Empezamos como servicio. Con cada operación acumulamos inteligencia comercial que ningún SaaS puede replicar.
        - strong [ref=e130]: "Ese es el camino de Service-as-a-Software a plataforma:"
        - text: primero hacemos el trabajo, después construimos la plataforma sobre los datos que solo nosotros tenemos. Scoring predictivo calibrado para el mercado local. Self-annealing que se optimiza en cada ciclo. La infraestructura agéntica que LATAM necesita.
