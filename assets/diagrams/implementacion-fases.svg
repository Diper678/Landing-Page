<svg width="100%" viewBox="0 0 680 520" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Cómo implementamos el servicio</title>
<desc>Timeline de 3 fases: diagnóstico en la semana 1, piloto en la semana 2 y operación continua desde la semana 3, con reuniones agendadas semanales. Tu equipo no aprende ninguna herramienta nueva.</desc>

<style>
  .t-title { font-family: "Space Grotesk", system-ui, sans-serif; font-size: 15px; font-weight: 600; fill: #111111; }
  .t-sub   { font-family: "Hanken Grotesk", system-ui, sans-serif; font-size: 12px; font-weight: 400; fill: #666666; }
  .ph-label{ font-family: "Space Grotesk", system-ui, sans-serif; font-size: 13px; font-weight: 600; fill: #111111; }
  .ph-head { font-family: "Space Grotesk", system-ui, sans-serif; font-size: 14px; font-weight: 600; fill: #111111; }
  .d-text  { font-family: "Hanken Grotesk", system-ui, sans-serif; font-size: 12px; font-weight: 500; fill: #111111; }
  .sum-t   { font-family: "Space Grotesk", system-ui, sans-serif; font-size: 13px; font-weight: 600; fill: #111111; }
  .sum-s   { font-family: "Hanken Grotesk", system-ui, sans-serif; font-size: 11px; font-weight: 400; fill: #666666; }
  .foot    { font-family: "Hanken Grotesk", system-ui, sans-serif; font-size: 12px; font-weight: 400; fill: #666666; }
  .box      { fill: #FFFFFF; stroke: #E5E5E5; stroke-width: 1; }
  .box-accent{ fill: #c5ed36; stroke: #b3d82f; stroke-width: 1; }
  .box-soft { fill: #F1F0EC; stroke: #E5E5E5; stroke-width: 1; }
  .tl       { stroke: #d8d8d3; stroke-width: 1.5; }
  .conn     { stroke: #d8d8d3; stroke-width: 1; }
  .marker   { fill: #111111; }
  .flow     { fill: none; stroke: #111111; stroke-width: 1.5; }
</style>

<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text x="340" y="30" text-anchor="middle" class="t-title">Cómo implementamos el servicio</text>
<text x="340" y="50" text-anchor="middle" class="t-sub">De cero a tus primeras reuniones en pocas semanas</text>

<!-- Timeline -->
<line class="tl" x1="100" y1="90" x2="580" y2="90"/>
<circle class="marker" cx="140" cy="90" r="5"/>
<circle class="marker" cx="340" cy="90" r="5"/>
<circle class="marker" cx="540" cy="90" r="5"/>
<text x="140" y="76" text-anchor="middle" class="ph-label">Semana 1</text>
<text x="340" y="76" text-anchor="middle" class="ph-label">Semana 2</text>
<text x="540" y="76" text-anchor="middle" class="ph-label">Semana 3+</text>
<line class="conn" x1="140" y1="95" x2="140" y2="130"/>
<line class="conn" x1="340" y1="95" x2="340" y2="130"/>
<line class="conn" x1="540" y1="95" x2="540" y2="130"/>

<!-- PHASE HEADERS (lima accent) -->
<rect class="box-accent" x="52" y="130" width="176" height="44" rx="8"/>
<text x="140" y="152" text-anchor="middle" dominant-baseline="central" class="ph-head">Diagnóstico</text>
<rect class="box-accent" x="252" y="130" width="176" height="44" rx="8"/>
<text x="340" y="152" text-anchor="middle" dominant-baseline="central" class="ph-head">Piloto</text>
<rect class="box-accent" x="452" y="130" width="176" height="44" rx="8"/>
<text x="540" y="152" text-anchor="middle" dominant-baseline="central" class="ph-head">Operación continua</text>

<!-- Arrows between phases -->
<line class="flow" x1="228" y1="152" x2="252" y2="152" marker-end="url(#arr)"/>
<line class="flow" x1="428" y1="152" x2="452" y2="152" marker-end="url(#arr)"/>

<!-- Phase 1 details -->
<line class="conn" x1="140" y1="174" x2="140" y2="186"/>
<rect class="box" x="52" y="186" width="176" height="36" rx="6"/>
<text x="140" y="204" text-anchor="middle" dominant-baseline="central" class="d-text">Definir ICP</text>
<line class="conn" x1="140" y1="222" x2="140" y2="230"/>
<rect class="box" x="52" y="230" width="176" height="36" rx="6"/>
<text x="140" y="248" text-anchor="middle" dominant-baseline="central" class="d-text">Elegir señales clave</text>
<line class="conn" x1="140" y1="266" x2="140" y2="274"/>
<rect class="box" x="52" y="274" width="176" height="36" rx="6"/>
<text x="140" y="292" text-anchor="middle" dominant-baseline="central" class="d-text">Configurar el agente</text>
<line class="conn" x1="140" y1="310" x2="140" y2="318"/>
<rect class="box" x="52" y="318" width="176" height="36" rx="6"/>
<text x="140" y="336" text-anchor="middle" dominant-baseline="central" class="d-text">Conectar tus canales</text>

<!-- Phase 2 details -->
<line class="conn" x1="340" y1="174" x2="340" y2="186"/>
<rect class="box" x="252" y="186" width="176" height="36" rx="6"/>
<text x="340" y="204" text-anchor="middle" dominant-baseline="central" class="d-text">Primeras señales reales</text>
<line class="conn" x1="340" y1="222" x2="340" y2="230"/>
<rect class="box" x="252" y="230" width="176" height="36" rx="6"/>
<text x="340" y="248" text-anchor="middle" dominant-baseline="central" class="d-text">Ajustar la calificación</text>
<line class="conn" x1="340" y1="266" x2="340" y2="274"/>
<rect class="box" x="252" y="274" width="176" height="36" rx="6"/>
<text x="340" y="292" text-anchor="middle" dominant-baseline="central" class="d-text">Calibrar mensajes</text>
<line class="conn" x1="340" y1="310" x2="340" y2="318"/>
<rect class="box" x="252" y="318" width="176" height="36" rx="6"/>
<text x="340" y="336" text-anchor="middle" dominant-baseline="central" class="d-text">Ajustes con tu equipo</text>

<!-- Phase 3 details -->
<line class="conn" x1="540" y1="174" x2="540" y2="186"/>
<rect class="box" x="452" y="186" width="176" height="36" rx="6"/>
<text x="540" y="204" text-anchor="middle" dominant-baseline="central" class="d-text">Reuniones semanales</text>
<line class="conn" x1="540" y1="222" x2="540" y2="230"/>
<rect class="box" x="452" y="230" width="176" height="36" rx="6"/>
<text x="540" y="248" text-anchor="middle" dominant-baseline="central" class="d-text">Reportes de avance</text>
<line class="conn" x1="540" y1="266" x2="540" y2="274"/>
<rect class="box" x="452" y="274" width="176" height="36" rx="6"/>
<text x="540" y="292" text-anchor="middle" dominant-baseline="central" class="d-text">Mejora continua</text>
<line class="conn" x1="540" y1="310" x2="540" y2="318"/>
<rect class="box" x="452" y="318" width="176" height="36" rx="6"/>
<text x="540" y="336" text-anchor="middle" dominant-baseline="central" class="d-text">Escala por industria</text>

<!-- Bottom summary -->
<text x="340" y="400" text-anchor="middle" class="t-title">Qué recibe tu equipo</text>

<rect class="box-soft" x="52" y="420" width="176" height="56" rx="8"/>
<text x="140" y="442" text-anchor="middle" dominant-baseline="central" class="sum-t">Reuniones agendadas</text>
<text x="140" y="460" text-anchor="middle" dominant-baseline="central" class="sum-s">en tu calendario</text>

<rect class="box-soft" x="252" y="420" width="176" height="56" rx="8"/>
<text x="340" y="442" text-anchor="middle" dominant-baseline="central" class="sum-t">Contexto de cada una</text>
<text x="340" y="460" text-anchor="middle" dominant-baseline="central" class="sum-s">quién, por qué, qué señal</text>

<rect class="box-soft" x="452" y="420" width="176" height="56" rx="8"/>
<text x="540" y="442" text-anchor="middle" dominant-baseline="central" class="sum-t">Reporte semanal</text>
<text x="540" y="460" text-anchor="middle" dominant-baseline="central" class="sum-s">qué pasó y qué viene</text>

<text x="340" y="506" text-anchor="middle" class="foot">Sin que tu equipo tenga que aprender una herramienta nueva</text>

</svg>
