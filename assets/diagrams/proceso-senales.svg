<svg width="100%" viewBox="0 0 680 620" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Pipeline de prospección por señales de Sisteco</title>
<desc>Diagrama de flujo: Sisteco detecta señales de mercado, enriquece con datos del SII, califica con IA, personaliza el mensaje y entrega un prospecto calificado listo para agendar reunión.</desc>

<style>
  .dg-title  { font-family: "Space Grotesk", system-ui, sans-serif; font-size: 15px; font-weight: 600; fill: #111111; }
  .dg-sub    { font-family: "Hanken Grotesk", system-ui, sans-serif; font-size: 12px; font-weight: 400; fill: #666666; }
  .dg-srclbl { font-family: "Space Grotesk", system-ui, sans-serif; font-size: 11px; font-weight: 600; fill: #666666; letter-spacing: 0.5px; }
  .dg-src    { font-family: "Hanken Grotesk", system-ui, sans-serif; font-size: 12px; font-weight: 500; fill: #111111; }
  .dg-node   { font-family: "Space Grotesk", system-ui, sans-serif; font-size: 14px; font-weight: 600; fill: #111111; }
  .dg-nsub   { font-family: "Hanken Grotesk", system-ui, sans-serif; font-size: 11px; font-weight: 400; fill: #666666; }
  .dg-anno   { font-family: "Hanken Grotesk", system-ui, sans-serif; font-size: 11px; font-weight: 400; fill: #666666; }
  .dg-out    { font-family: "Space Grotesk", system-ui, sans-serif; font-size: 13px; font-weight: 600; fill: #111111; }
  .dg-vert   { font-family: "Space Grotesk", system-ui, sans-serif; font-size: 11px; font-weight: 600; fill: #111111; letter-spacing: 2px; }
  .box       { fill: #FFFFFF; stroke: #E5E5E5; stroke-width: 1; }
  .box-soft  { fill: #F1F0EC; stroke: #E5E5E5; stroke-width: 1; }
  .box-accent{ fill: #c5ed36; stroke: #b3d82f; stroke-width: 1; }
  .flow      { fill: none; stroke: #111111; stroke-width: 1.5; }
  .anno-line { fill: none; stroke: #c9c9c4; stroke-width: 1; stroke-dasharray: 4 3; }
  .anno-dot  { fill: #111111; }
</style>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Title -->
<text x="340" y="30" text-anchor="middle" class="dg-title">Cómo funciona el motor de señales</text>
<text x="340" y="50" text-anchor="middle" class="dg-sub">Detección continua → prospectos listos para agendar, sin trabajo manual</text>

<!-- STAGE 1: Signal sources -->
<text x="108" y="88" text-anchor="middle" class="dg-srclbl">Fuentes de señales</text>

<rect class="box-soft" x="40" y="100" width="136" height="36" rx="6"/>
<text x="108" y="118" text-anchor="middle" dominant-baseline="central" class="dg-src">Licitaciones</text>

<rect class="box-soft" x="40" y="144" width="136" height="36" rx="6"/>
<text x="108" y="162" text-anchor="middle" dominant-baseline="central" class="dg-src">Portales de empleo</text>

<rect class="box-soft" x="40" y="188" width="136" height="36" rx="6"/>
<text x="108" y="206" text-anchor="middle" dominant-baseline="central" class="dg-src">Noticias / prensa</text>

<rect class="box-soft" x="40" y="232" width="136" height="36" rx="6"/>
<text x="108" y="250" text-anchor="middle" dominant-baseline="central" class="dg-src">LinkedIn / redes</text>

<!-- Arrows: sources -> detection -->
<line class="flow" x1="176" y1="118" x2="250" y2="178" marker-end="url(#arrow)"/>
<line class="flow" x1="176" y1="162" x2="250" y2="185" marker-end="url(#arrow)"/>
<line class="flow" x1="176" y1="206" x2="250" y2="195" marker-end="url(#arrow)"/>
<line class="flow" x1="176" y1="250" x2="250" y2="205" marker-end="url(#arrow)"/>

<!-- STAGE 2: Detect -->
<rect class="box" x="258" y="160" width="164" height="56" rx="10"/>
<text x="340" y="181" text-anchor="middle" dominant-baseline="central" class="dg-node">Detectar</text>
<text x="340" y="200" text-anchor="middle" dominant-baseline="central" class="dg-nsub">Monitoreo 24/7</text>

<line class="flow" x1="340" y1="216" x2="340" y2="264" marker-end="url(#arrow)"/>

<!-- STAGE 3: Enrich -->
<rect class="box" x="258" y="272" width="164" height="56" rx="10"/>
<text x="340" y="293" text-anchor="middle" dominant-baseline="central" class="dg-node">Enriquecer</text>
<text x="340" y="312" text-anchor="middle" dominant-baseline="central" class="dg-nsub">Datos del SII + contacto</text>

<line class="anno-line" x1="422" y1="300" x2="468" y2="300"/>
<circle class="anno-dot" cx="422" cy="300" r="2"/>
<text x="474" y="290" class="dg-anno">RUT, giro, contacto</text>
<text x="474" y="306" class="dg-anno">verificado, señal</text>

<line class="flow" x1="340" y1="328" x2="340" y2="376" marker-end="url(#arrow)"/>

<!-- STAGE 4: Qualify -->
<rect class="box" x="258" y="384" width="164" height="56" rx="10"/>
<text x="340" y="405" text-anchor="middle" dominant-baseline="central" class="dg-node">Calificar</text>
<text x="340" y="424" text-anchor="middle" dominant-baseline="central" class="dg-nsub">Relevancia + momento</text>

<line class="anno-line" x1="422" y1="412" x2="468" y2="412"/>
<circle class="anno-dot" cx="422" cy="412" r="2"/>
<text x="474" y="402" class="dg-anno">La IA puntúa cada</text>
<text x="474" y="418" class="dg-anno">prospecto por encaje</text>

<line class="flow" x1="340" y1="440" x2="340" y2="488" marker-end="url(#arrow)"/>

<!-- STAGE 5: Personalize -->
<rect class="box" x="258" y="496" width="164" height="56" rx="10"/>
<text x="340" y="517" text-anchor="middle" dominant-baseline="central" class="dg-node">Personalizar</text>
<text x="340" y="536" text-anchor="middle" dominant-baseline="central" class="dg-nsub">Mensaje por señal</text>

<line class="anno-line" x1="422" y1="524" x2="468" y2="524"/>
<circle class="anno-dot" cx="422" cy="524" r="2"/>
<text x="474" y="514" class="dg-anno">Cada mensaje nombra</text>
<text x="474" y="530" class="dg-anno">la señal específica</text>

<line class="flow" x1="340" y1="552" x2="340" y2="578" marker-end="url(#arrow)"/>

<!-- OUTPUT -->
<rect class="box-accent" x="170" y="582" width="340" height="32" rx="16"/>
<text x="340" y="599" text-anchor="middle" dominant-baseline="central" class="dg-out">Prospecto calificado, listo para agendar</text>

<!-- Left: "TU AGENTE" label spanning the pipeline -->
<text x="244" y="400" text-anchor="middle" transform="rotate(-90, 244, 400)" class="dg-vert">TU AGENTE</text>
<rect x="248" y="155" width="1" height="405" fill="#111111" opacity="0.12"/>

</svg>
