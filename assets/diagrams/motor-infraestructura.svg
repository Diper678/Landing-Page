<svg width="100%" viewBox="0 0 680 470" role="img" xmlns="http://www.w3.org/2000/svg">
<title>El motor de Sisteco por dentro: capas de infraestructura</title>
<desc>La infraestructura del agente en cinco capas: captura continua de señales, verificación con el SII, calificación con IA que se ajusta sola, activación multicanal y entrega de reuniones agendadas. La Ley 21.719 cubre cada capa.</desc>

<style>
  .dg-title  { font-family: "Space Grotesk", system-ui, sans-serif; font-size: 15px; font-weight: 600; fill: #111111; }
  .dg-sub    { font-family: "Hanken Grotesk", system-ui, sans-serif; font-size: 12px; font-weight: 400; fill: #666666; }
  .dg-node   { font-family: "Space Grotesk", system-ui, sans-serif; font-size: 14px; font-weight: 600; fill: #111111; }
  .dg-nsub   { font-family: "Hanken Grotesk", system-ui, sans-serif; font-size: 12px; font-weight: 400; fill: #666666; }
  .dg-num    { font-family: "Space Grotesk", system-ui, sans-serif; font-size: 13px; font-weight: 600; fill: #111111; }
  .dg-rail   { font-family: "Space Grotesk", system-ui, sans-serif; font-size: 12px; font-weight: 600; fill: #111111; letter-spacing: 2px; }
  .dg-railsub{ font-family: "Hanken Grotesk", system-ui, sans-serif; font-size: 10px; font-weight: 400; fill: #666666; }
  .dg-loop   { font-family: "Space Grotesk", system-ui, sans-serif; font-size: 10px; font-weight: 600; fill: #7a9e16; letter-spacing: 1.5px; }
  .dg-foot   { font-family: "Hanken Grotesk", system-ui, sans-serif; font-size: 11px; font-weight: 400; fill: #666666; }
  .box       { fill: #FFFFFF; stroke: #E5E5E5; stroke-width: 1; }
  .box-soft  { fill: #F1F0EC; stroke: #E5E5E5; stroke-width: 1; }
  .box-accent{ fill: #c5ed36; stroke: #b3d82f; stroke-width: 1; }
  .num-c     { fill: #c5ed36; stroke: #b3d82f; stroke-width: 1; }
  .flow      { fill: none; stroke: #111111; stroke-width: 1.5; }
  .loop      { fill: none; stroke: #b3d82f; stroke-width: 1.5; stroke-dasharray: 4 3; }
  .anno-line { fill: none; stroke: #c9c9c4; stroke-width: 1; stroke-dasharray: 4 3; }
  .shield    { fill: none; stroke: #111111; stroke-width: 1.3; stroke-linejoin: round; }
  .check     { fill: none; stroke: #111111; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
</style>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Title -->
<text x="340" y="30" text-anchor="middle" class="dg-title">El motor por dentro</text>
<text x="340" y="50" text-anchor="middle" class="dg-sub">Cinco capas. Cada una filtra antes de pasar a la siguiente.</text>

<!-- Compliance rail (spans every layer) -->
<rect class="box-soft" x="560" y="80" width="88" height="344" rx="12"/>
<path class="shield" d="M604 100 L617 105 L617 116 C617 124 611 129 604 132 C597 129 591 124 591 116 L591 105 Z"/>
<path class="check" d="M598 115 l4 4 l8 -9"/>
<text x="604" y="150" text-anchor="middle" class="dg-railsub">Cumplimiento</text>
<text x="604" y="318" text-anchor="middle" class="dg-rail" transform="rotate(-90, 604, 290)">LEY 21.719</text>
<text x="604" y="412" text-anchor="middle" class="dg-railsub">en cada capa</text>

<!-- Dashed connectors: every band -> compliance rail -->
<line class="anno-line" x1="540" y1="108" x2="558" y2="108"/>
<line class="anno-line" x1="540" y1="180" x2="558" y2="180"/>
<line class="anno-line" x1="540" y1="252" x2="558" y2="252"/>
<line class="anno-line" x1="540" y1="324" x2="558" y2="324"/>
<line class="anno-line" x1="540" y1="396" x2="558" y2="396"/>

<!-- Flow spine (top to bottom through the layers) -->
<line class="flow" x1="98" y1="123" x2="98" y2="165" marker-end="url(#arrow)"/>
<line class="flow" x1="98" y1="195" x2="98" y2="237" marker-end="url(#arrow)"/>
<line class="flow" x1="98" y1="267" x2="98" y2="309" marker-end="url(#arrow)"/>
<line class="flow" x1="98" y1="339" x2="98" y2="381" marker-end="url(#arrow)"/>

<!-- Feedback loop: la calificación se ajusta con cada resultado -->
<path class="loop" d="M84 388 C48 356, 48 288, 84 256" marker-end="url(#arrow)"/>
<text x="42" y="322" text-anchor="middle" class="dg-loop" transform="rotate(-90, 42, 322)">SE MEJORA SOLA</text>

<!-- LAYER 1: Captura -->
<rect class="box" x="120" y="80" width="420" height="56" rx="10"/>
<circle class="num-c" cx="98" cy="108" r="15"/>
<text x="98" y="108" text-anchor="middle" dominant-baseline="central" class="dg-num">1</text>
<text x="140" y="104" class="dg-node">Captura continua</text>
<text x="140" y="122" class="dg-nsub">Vigila LinkedIn, prensa, licitaciones y contrataciones, 24/7.</text>

<!-- LAYER 2: Verificación SII -->
<rect class="box" x="120" y="152" width="420" height="56" rx="10"/>
<circle class="num-c" cx="98" cy="180" r="15"/>
<text x="98" y="180" text-anchor="middle" dominant-baseline="central" class="dg-num">2</text>
<text x="140" y="176" class="dg-node">Verificación con el SII</text>
<text x="140" y="194" class="dg-nsub">Cruza RUT, giro y tamaño real. Descarta lo que no existe.</text>

<!-- LAYER 3: Calificación IA -->
<rect class="box" x="120" y="224" width="420" height="56" rx="10"/>
<circle class="num-c" cx="98" cy="252" r="15"/>
<text x="98" y="252" text-anchor="middle" dominant-baseline="central" class="dg-num">3</text>
<text x="140" y="248" class="dg-node">Calificación con IA</text>
<text x="140" y="266" class="dg-nsub">Encaje con tu perfil y el momento. Se ajusta con cada resultado.</text>

<!-- LAYER 4: Activación -->
<rect class="box" x="120" y="296" width="420" height="56" rx="10"/>
<circle class="num-c" cx="98" cy="324" r="15"/>
<text x="98" y="324" text-anchor="middle" dominant-baseline="central" class="dg-num">4</text>
<text x="140" y="320" class="dg-node">Activación / contacto</text>
<text x="140" y="338" class="dg-nsub">Mensaje por señal. Email, LinkedIn y WhatsApp.</text>

<!-- LAYER 5: Entrega (output) -->
<rect class="box-accent" x="120" y="368" width="420" height="56" rx="10"/>
<circle class="num-c" cx="98" cy="396" r="15" style="fill:#111111;stroke:#111111"/>
<text x="98" y="396" text-anchor="middle" dominant-baseline="central" class="dg-num" style="fill:#c5ed36">5</text>
<text x="140" y="392" class="dg-node">Entrega: reuniones</text>
<text x="140" y="410" class="dg-nsub" style="fill:#3d4a13">Reunión agendada, con el contexto de quién y por qué ahora.</text>

<!-- Footer caption -->
<text x="340" y="450" text-anchor="middle" class="dg-foot">Cumple la Ley 21.719 de punta a punta: consentimiento y trazabilidad en cada capa.</text>

</svg>
